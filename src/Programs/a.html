<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .subscribe-button {
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        /* height: 37px;
            width: 115px; */
        border-radius: 2px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right: 16px;
        cursor: pointer;
        margin-right: 5px;
        transition: opacity 0.15s;
        vertical-align: top;



    }

    .subscribe-button:hover {
        opacity: 0.5;
    }

    .subscribe-button:active {
        opacity: 0.4;
    }

    .join-button {
        background-color: white;
        color: rgb(33, 131, 235);
        border-color: rgb(83, 83, 222);
        /* height: 37px;
            width: 60px; */
        margin: 10px;
        padding-top: 7px;
        padding-bottom: 7px;
        padding-left: 15px;
        padding-right: 15px;
        border-style: solid;
        border-width: 1px;
        border-radius: 2px;
        vertical-align: top;
        cursor: pointer;
        transition: background-color 0.5s, color 1s;
    }

    .join-button:hover {
        background-color: rgb(71, 71, 204);
        color: white;
    }

    .join-button:active {
        opacity: 0.7;
    }

    .tweet-button {
        background-color: rgb(59, 118, 226);
        color: white;
        /* height: 37px;
            width: 70px; */
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right: 16px;
        vertical-align: top;
        border-style: none;
        border-radius: 20px;
        cursor: pointer;
        margin-left: 5px;
        font-weight: bold;
        transition: box-shadow 1s;

    }

    .tweet-button:hover {
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1)
    }

    p {
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0;
        margin-bottom: 0;

    }

    .vedio-title {
        font-size: 18px;
        font-weight: bold;
        width: 300px;
        line-height: 24px;
        margin-bottom: 5px;
    }

    .vedio-stats {
        font-size: 14px;
        color: rgb(96, 96, 96);
        margin-bottom: 20px;
    }

    .vedio-author {
        font-size: 14px;
        color: rgb(96, 96, 96);
        margin-bottom: 20px;
    }

    .vedio-description {
        font-size: 14px;
        color: rgb(96, 96, 96);
        width: 280px;
        line-height: 22px;
        margin-bottom: 80px;
    }

    .apple-text {
        margin-bottom: 50px;
        font-size: 14px;
        background-color: rgb(227, 65, 64);
        color: white;
        text-align: center;
        padding: 20px;
    }

    .span-ex {
        cursor: pointer;
    }

    .span-ex:hover {
        text-decoration: underline;
    }
</style>

<body>
    <button class="subscribe-button">
        SUBSCRIBE
    </button>
    <button class="join-button">
        JOIN
    </button>
    <button class="tweet-button">
        Tweet
    </button>
    <script src="a.js"></script>

    <p class="vedio-title">
        Talking Tech and AI with Google CEO Sundar Pichai!
    </p>
    <p class="vedio-stats">
        3.4M views &#183; 6 months ago
    </p>
    <p class="vedio-author">
        Marques Brownlee ✓
    </p>
    <p class="vedio-description">
        Talking tech and AI on the heels of Google I/O.
        Also a daily driver phone reveal from Google's CEO. Shoutout to Sundar!
    </p>
    <p class="apple-text">
        Shop early for the best selection of holiday favourites. <span class="span-ex">Shop now ></span>
    </p>

</body>

</html
